apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ${{ values.appName }}-dev

resources:
  - ../../base

patches:
  # Dev: single replica, lower resources
  - target:
      kind: Deployment
      name: ${{ values.appName }}-frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 25m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 32Mi

  - target:
      kind: Deployment
      name: ${{ values.appName }}-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi

  # Dev: 1 DB instance, 1Gi storage
  - target:
      kind: Cluster
      name: ${{ values.appName }}-db
    patch: |
      - op: replace
        path: /spec/instances
        value: 1
      - op: replace
        path: /spec/storage/size
        value: 1Gi

  # Dev ingress host
  - target:
      kind: Ingress
      name: ${{ values.appName }}-frontend
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: ${{ values.appName }}-dev.${{ values.ingressDomain }}
  - target:
      kind: Ingress
      name: ${{ values.appName }}-backend
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.${{ values.appName }}-dev.${{ values.ingressDomain }}
