apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ${{ values.appName }}-prod

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: ${{ values.appName }}-frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  - target:
      kind: Deployment
      name: ${{ values.appName }}-backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi

  - target:
      kind: Cluster
      name: ${{ values.appName }}-db
    patch: |
      - op: replace
        path: /spec/instances
        value: 3
      - op: replace
        path: /spec/storage/size
        value: 25Gi

  - target:
      kind: Ingress
      name: ${{ values.appName }}-frontend
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: ${{ values.appName }}.${{ values.ingressDomain }}
  - target:
      kind: Ingress
      name: ${{ values.appName }}-backend
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: api.${{ values.appName }}.${{ values.ingressDomain }}
