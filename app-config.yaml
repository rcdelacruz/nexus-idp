app:
  title: Nexus IDP
  baseUrl: 'http://localhost:3000'
  https:
    certificate:
      cert: './cert.pem'
      key: './key.pem'

organization:
  name: Stratpoint Technologies
  domain: stratpoint.com
  githubOwner: stratpoint-engineering
  githubRepo: backstage-main
  usersFilePath: stratpoint/org/users.yaml

backend:
  logging:
    level: debug
  # Used for enabling authentication, secret is shared by all backend plugins
  auth:
    keys:
      - secret: ${BACKEND_SECRET}
  baseUrl: 'http://localhost:7007'
  reading:
    allow:
      - host: github.com
      - host: gitlab.coderstudio.co
      - host: gitlab.com
      - host: ''
  listen:
    port: 7007
    host: '0.0.0.0'
    # Uncomment the following host directive to bind to specific interfaces
    # host: 127.0.0.1
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    script-src: ["'self'", "'unsafe-inline'", "'unsafe-eval'"]
    style-src: ["'self'", "'unsafe-inline'", 'https://fonts.googleapis.com']
    worker-src: ["'self'", 'blob:']
    font-src: ["'self'", 'https://fonts.gstatic.com']
    # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
    # Default Helmet Content-Security-Policy values can be removed by setting the key to false
  cors:
    origin: [http://localhost:3000, https://portal.stratpoint.io]
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # This is for local development only, it is not recommended to use this in production
  # The production database configuration is stored in app-config.production.yaml
  cache:
    store: redis
    connection: ${REDIS_URL}
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}

integrations:
  github:
    - host: github.com
      # This is a Personal Access Token or PAT from GitHub. You can find out how to generate this token, and more information
      # about setting up the GitHub integration here: https://backstage.io/docs/integrations/github/locations#configuration
      token: ${GITHUB_TOKEN}
      debug: false
    ### Example for how to add your GitHub Enterprise instance using the API:
    # - host: ghe.example.net
    #   apiBaseUrl: https://ghe.example.net/api/v3
    #   token: ${GHE_TOKEN}
  gitlab:
    - host: gitlab.coderstudio.co
      token: ${GITLAB_TOKEN}
      apiBaseUrl: https://gitlab.coderstudio.co/api/v4
    - host: gitlab.com
      token: ${GITLAB_COM_TOKEN}
      apiBaseUrl: https://gitlab.com/api/v4


# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: 'local'
  generator:
    runIn: 'docker'
  publisher:
    type: 'local'
    local:
      publishDir: 'generated/docs'
  reading:
    allow:
      - host: github.com
      - host: gitlab.coderstudio.co

auth:
  environment: development
  providers:
    github:
      development:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        callbackUrl: ${AUTH_GITHUB_CALLBACK_URL}
        # Enable GitHub sign-in
        signIn:
          enabled: true
    google:
      development:
        clientId: ${AUTH_GOOGLE_CLIENT_ID}
        clientSecret: ${AUTH_GOOGLE_CLIENT_SECRET}
        # Sign-in resolver is handled by the custom google-auto-provision module
        # which auto-provisions @stratpoint.com users into general-engineers on first login

scaffolder:
  github:
    token: ${GITHUB_TOKEN}
    visibility: private
  engineeringStandards:
    # Local dev: file path to your local clone of the engineering-standards repo
    localPath: ${ENGINEERING_STANDARDS_LOCAL_PATH}
    # Production: GitHub (or any other) URL to the engineering-standards repo
    # Supports any Git host — GitHub, GitLab, Bitbucket, etc.
    githubUrl: ${ENGINEERING_STANDARDS_REPO_URL}
  # Base domain for scaffolded app ingress URLs.
  # Set in .env as SCAFFOLDER_INGRESS_DOMAIN
  # Examples: 192.168.2.210.nip.io, apps.coderstudio.co, apps.example.com
  ingressDomain: ${SCAFFOLDER_INGRESS_DOMAIN}

  # ── Infra Targets ────────────────────────────────────────────────────────
  # Single source of truth for all available deployment targets.
  # Portal admin configures this — engineers never enter infra details manually.
  # Add new clusters/accounts here to make them available in scaffolder templates.
  targets:
    kubernetes:
      - name: talos-homelab
        displayName: 'Talos Homelab (Self-hosted)'
        type: k8s-selfhosted
        ingressDomain: ${SCAFFOLDER_INGRESS_DOMAIN}
        storageClass: longhorn
        ingressClass: traefik
        argocdUrl: ${ARGOCD_URL}
        # Frameworks supported on this target
        supportedFrameworks: [nextjs, nodejs, nestjs, springboot, python]

    aws:
      - name: stratpoint-nonprod
        displayName: 'Stratpoint (Non-prod)'
        accountId: '${FINOPS_AWS_ACCOUNT_NONPROD}'
        region: us-west-2
        ecrRegistry: '${FINOPS_AWS_ACCOUNT_NONPROD}.dkr.ecr.us-west-2.amazonaws.com'
        targets:
          ecs:
            - name: backstage-idp
              displayName: 'Backstage IDP Cluster'
              clusterName: backstage-idp-cluster
              supportedFrameworks: [nextjs, nodejs, nestjs, springboot, python]
          ec2:
            enabled: true
            supportedFrameworks: [nodejs, nestjs, springboot, python]
          lambda:
            enabled: true
            # Lambda: backend/serverless frameworks only
            supportedFrameworks: [nodejs, nestjs, springboot, python]
          appRunner:
            enabled: true
            supportedFrameworks: [nextjs, nodejs, nestjs, springboot, python]
      # Add client AWS accounts here:
      # - name: client-project-x
      #   displayName: 'Client Project X'
      #   accountId: '111122223333'
      #   region: ap-southeast-1

  # ── OpenTofu State Backend ────────────────────────────────────────────────
  # Used by infra templates to store OpenTofu state
  tofu:
    stateBackend:
      s3Bucket: ${TOFU_STATE_BUCKET}
      s3Region: ${TOFU_STATE_REGION}
      dynamoTable: ${TOFU_LOCK_TABLE}
      #   targets:
      #     ecs: [...]

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Group, User]
  # Orphan strategy: delete entities whose source repo no longer has catalog-info.yaml
  orphanStrategy: delete
  providers:
    github:
      stratpoint:
        organization: stratpoint-engineering
        catalogPath: /catalog-info.yaml
        filters:
          branch: main
        schedule:
          frequency: { minutes: 30 }
          timeout: { minutes: 3 }
  locations:
    # Stratpoint Organization - Root catalog location
    - type: file
      target: ../../stratpoint/catalog-info.yaml
      rules:
        - allow: [Location, Component, System, API, Resource, Group, User]

    # Local templates (development)
    - type: file
      target: ../../templates/three-tier-app/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ../../templates/documentation/template.yaml
      rules:
        - allow: [Template]

    # Stratpoint Templates - maintained in separate repository (private)
    # See app-config.local.yaml for development template references
    # Production templates loaded from: https://github.com/stratpoint-engineering/engineering-standards.git
    # Uncomment for production:
    # - type: url
    #   target: https://github.com/stratpoint-engineering/engineering-standards/blob/main/templates/projects/catalog-info.yaml
    #   rules:
    #     - allow: [Template, Location, Component, System, Domain, Group]

    # External examples
    # - type: url
    #   target: https://github.com/backstage/backstage/blob/master/catalog-info.yaml
      # rules:
      #   - allow: [Component, System, API, Resource, Location, Group, User]
      # owner: group:default/backstage-admins

    # - type: url
    #   target: https://gitlab.coderstudio.co/stratpoint/engineering-standards/-/blob/main/catalog-info.yml
    # - type: url
    #   target: https://raw.githubusercontent.com/devxp-tech/backstage-catalog/main/devxp/all.yaml
    #   rules:
    #     - allow: [Component, System, API, Resource, Location, Group, User]
    #   owner: group:default/backstage-admins

    # - type: url
    #   target: https://raw.githubusercontent.com/devxp-tech/backstage/main/catalog-info.yaml
    #   rules:
    #     - allow: [Component, System, API, Resource, Location, Group, User]
    #   owner: group:default/backstage-admins

    ## Uncomment these lines to add more example data
    # - type: url
    #   target: https://github.com/backstage/backstage/blob/master/packages/catalog-model/examples/all.yaml

    ## Uncomment these lines to add an example org
    # - type: url
    #   target: https://github.com/backstage/backstage/blob/master/packages/catalog-model/examples/acme-corp.yaml
    #   rules:
    #     - allow: [User, Group]


    # Local template overrides: add in app-config.local.yaml (gitignored)
    # See app-config.local.yaml.example for template

kubernetes:
  serviceLocatorMethod:
    type: 'multiTenant'
  clusterLocatorMethods:
    - type: 'config'
      clusters:
        - name: talos-homelab
          # In-cluster URL — works because Backstage runs inside the same cluster.
          # If running Backstage outside the cluster, change to: https://192.168.2.198:6443
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          # In-cluster token: no serviceAccountToken or caData needed.
          # The Backstage pod must run with serviceAccountName: backstage-k8s-reader
          # (set in Helm values). Kubernetes automatically mounts the projected SA token.
          skipTLSVerify: false
          # Set to true if metrics-server is not installed (run `kubectl top nodes` to check).
          # Without metrics-server, CPU/memory charts won't show but everything else works.
          skipMetricsLookup: false

proxy:
  endpoints:
    # GitHub API proxy — used by GitHub Actions plugin (CI/CD tab)
    # Injects server-side GITHUB_TOKEN so users don't need GitHub OAuth
    '/github/api':
      target: https://api.github.com
      changeOrigin: true
      headers:
        Authorization: Bearer ${GITHUB_TOKEN}
        Accept: application/vnd.github+json

    # ArgoCD API proxy — used by the ArgoCD history card on entity overview pages
    '/argocd/api':
      target: ${ARGOCD_URL}
      changeOrigin: true
      secure: false
      headers:
        Cookie: ${ARGOCD_AUTH_TOKEN}
        # ARGOCD_AUTH_TOKEN format: argocd.token=<jwt>
        # Get it from: ArgoCD UI → User Info → Copy JWT token

argocd:
  baseUrl: ${ARGOCD_FRONTEND_URL}
  revisionsToLoad: 20
  appLocatorMethods:
    - type: 'config'
      instances:
        - name: argocd
          url: ${ARGOCD_URL}
          frontendUrl: ${ARGOCD_FRONTEND_URL}
          token: ${ARGOCD_TOKEN}
          rejectUnauthorized: false
          # ARGOCD_TOKEN: bare JWT (same value as ARGOCD_AUTH_TOKEN without the "argocd.token=" prefix)
          # Create a dedicated service account for Backstage:
          #   argocd account create --account backstage
          #   argocd account generate-token --account backstage

# see https://backstage.io/docs/permissions/getting-started for more on the permission framework
permission:
  # setting this to `false` will disable permissions
  enabled: true
  # NOTE: All permission policy logic is in packages/backend/src/plugins/permission.ts
  # (CatalogPermissionPolicy). The YAML `policies` block is NOT a supported Backstage
  # config pattern and has no effect — do not add rules here.

# Local Provisioner Configuration
localProvisioner:
  # Enable or disable the local provisioning feature
  enabled: true

  # SSE heartbeat interval in seconds (keeps agent connections alive)
  sseHeartbeatInterval: 30

  # Task retention period in days (cleanup old completed/failed tasks)
  taskRetentionDays: 30

  # Supported resource types for local provisioning
  supportedResources:
    - kafka
    - postgres
    - redis
    - mongodb

  # Agent configuration
  agent:
    # Minimum required agent version
    minimumVersion: '1.0.0'

engineeringDocs:
  sources:
    - id: nexus-idp-docs
      label: Nexus IDP Docs
      description: Nexus IDP platform documentation — permissions, user management, integrations
      repoOwner: stratpoint-engineering
      repoName: backstage-main
      branch: main
      contentBase: docs/content

    - id: engineering-hub
      label: Engineering Hub
      description: Stratpoint engineering standards, guides, and golden paths
      repoOwner: stratpoint-engineering
      repoName: engineering-hub
      branch: main
      contentBase: src/content

    # Local Provisioner docs live at plugins/local-provisioner/docs/
    # Will be wired as an engineering-docs source once plugins are in separate repos.

    # strat-training/kafka is a PUBLIC repo — any valid GITHUB_TOKEN can read it.
    - id: kafka-training
      label: Kafka Training
      description: Kafka training materials, guides, and exercises
      repoOwner: strat-training
      repoName: kafka
      branch: main
      contentBase: docs

finops:
  awsAccessPortalUrl: 'https://stratpoint.awsapps.com/start'
  awsRoleToAssume: 'AccountAdmin'
  aws:
    region: us-east-1
    idleThresholdDays: 180
    cacheTtlSeconds: 86400
    accounts:
      - id: nonprod
        name: Non-Prod
        profile: cost-admin-nonprod
        awsAccountNumber: '${FINOPS_AWS_ACCOUNT_NONPROD}'
      - id: legacy
        name: Legacy
        profile: cost-admin-legacy
        awsAccountNumber: '${FINOPS_AWS_ACCOUNT_LEGACY}'
      - id: prod
        name: Production
        profile: cost-admin-prod
        awsAccountNumber: '${FINOPS_AWS_ACCOUNT_PROD}'
