x-common-variables: &common-variables
  NODE_ENV: development
  LOCAL_USER_ID: ${UID:-1000}
  LOCAL_GROUP_ID: ${GID:-1000}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB:-backstage}
  POSTGRES_USER: ${POSTGRES_USER:-backstage}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backstage}

services:
  # Development container - this is the main devcontainer
  dev:
    build:
      context: .
      dockerfile: build/node/Dockerfile
      target: cli
    env_file:
      - .env
    environment:
      <<: *common-variables
    ports:
      - "3000:3300"
      - "7007:7707"
    volumes:
      - ./:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
    user: node
    hostname: dev
    working_dir: /workspace
    # Keep container running for devcontainer
    command: /bin/sh -c "mkdir -p /home/node/.cache && exec sleep infinity"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backstage_network

  # Database service - runs outside devcontainer
  db:
    image: postgres:13.3-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    container_name: db
    environment:
      <<: *common-variables
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backstage_network

  # Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backstage_network

volumes:
  postgres_data:
    name: backstage_postgres_data
  redis_data:
    name: backstage_redis_data

networks:
  backstage_network:
    name: backstage_network
    driver: bridge
