site_name: 'Stratpoint Backstage Documentation'
site_description: 'Main documentation for Stratpoint Backstage'

docs_dir: content
site_dir: site

nav:
  - Home: index.md
  - Setup:
    - Google Workspace: GOOGLE_WORKSPACE_SETUP.md
    - User Groups: USER_GROUP_MANAGEMENT.md
  - TechDocs Guide: TECHDOCS_GUIDE.md
  - Security:
    - Permission System: PERMISSION_SYSTEM.md
    - Template Permissions: TEMPLATE_PERMISSIONS.md

plugins:
  - techdocs-core
  - monorepo

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - mdx_truly_sane_lists
  - toc:
      permalink: true

theme:
  name: material
  features:
    - navigation.expand
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.integrate
  palette:
    primary: blue
    accent: blue
