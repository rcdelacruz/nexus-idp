app = "backstage-stratpoint"
primary_region = "sin"  # Singapore (closest to PH)

[build]
  dockerfile = "build/prod/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "7007"
  BACKEND_PORT = "7007"

[http_service]
  internal_port = 7007
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthcheck"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[services]]
  protocol = "tcp"
  internal_port = 7007

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
